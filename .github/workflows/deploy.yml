name: Deploy to GitHub Pages

# Fires on ordinary pushes to main (e.g. the maintainer editing config/tickers.json
# or any source file). Bot commits pushed by fetch-tw.yml/fetch-us.yml/backfill.yml
# using the default GITHUB_TOKEN do NOT re-trigger this (GitHub's loop-prevention
# for Actions-authored pushes) — those workflows build+deploy themselves instead.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
