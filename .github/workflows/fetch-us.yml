name: Fetch US market data

on:
  schedule:
    # 22:30 UTC = 06:30 Taipei, after the US close (04:00-05:00 Taipei across
    # both DST states). Tue-Sat UTC covers Mon-Fri US trading days.
    - cron: '30 22 * * 2-6'
    # Retry: 23:30 UTC. Same idempotent-retry reasoning as fetch-tw.yml — a
    # repeat fetch that finds nothing new produces an empty diff, so the
    # commit/deploy steps are skipped and this run is a no-op.
    - cron: '30 23 * * 2-6'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch US stocks + indices
        run: npm run fetch:us

      - name: Check for changes
        id: git-check
        run: |
          git add public/data
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push data
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): update US market data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Setup Pages
        if: steps.git-check.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Build
        if: steps.git-check.outputs.changed == 'true'
        run: npm run build

      - name: Upload Pages artifact
        if: steps.git-check.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        if: steps.git-check.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
